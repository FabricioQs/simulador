<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>

    <div class="container">
        <!-- Contenedor del Logo de FabriTekhx -->
        <div class="logo-container">
            <img src="img/logo.png" alt="FabriTekhx Logo" class="brand-logo">
        </div>

        <h1>Simulador de Crédito</h1>

        <!-- Sección Datos Financieros -->
        <fieldset class="form-section">
            <legend>Datos financieros</legend>
            
            <div class="input-group">
                <label for="txtIngresos">Ingresos</label>
                <input type="text" id="txtIngresos" placeholder="Ej. 1000.00">
                <span class="error-msg" id="errIngresos"></span> <!-- Espacio para el error -->
            </div>

            <div class="input-group">
                <label for="txtEgresos">Egresos</label>
                <input type="text" id="txtEgresos" placeholder="Ej. 600.00">
                <span class="error-msg" id="errEgresos"></span>
            </div>

            <div class="results-grid">
                <p>Disponible: <span id="spnDisponible">USD 0.00</span></p>
                <p>Capacidad de pago: <span id="spnCapacidadPago">USD 0.00</span></p>
            </div>
        </fieldset>

        <!-- Sección Solicitud de Crédito -->
        <fieldset class="form-section">
            <legend>Solicitud de crédito</legend>
            
            <div class="input-group">
                <label for="txtMonto">Monto solicitado</label>
                <input type="text" id="txtMonto" placeholder="Ej. 2000">
                <span class="error-msg" id="errMonto"></span>
            </div>

            <div class="input-group-row">
                <div class="input-group">
                    <label for="txtPlazo">Plazo (Años)</label>
                    <input type="text" id="txtPlazo" placeholder="Ej. 1">
                    <span class="error-msg" id="errPlazo"></span>
                </div>
                <div class="input-group">
                    <label for="txtTasaInteres">Tasa Interés (%)</label>
                    <input type="text" id="txtTasaInteres" placeholder="Ej. 10">
                    <span class="error-msg" id="errTasaInteres"></span>
                </div>
            </div>

            <div class="results-grid visual-summary">
                <p>Interés a pagar: <span id="spnInteresPagar">USD 0.00</span></p>
                <p>Total préstamo: <span id="spnTotalPrestamo">USD 0.00</span></p>
                <p>Cuota mensual: <span id="spnCuotaMensual">USD 0.00</span></p>
            </div>

            <div class="status-box">
                <p>Estado del crédito</p>
                <span id="spnEstadoCredito">ANALIZANDO...</span>
            </div>
        </fieldset>

        <!-- Botonera -->
        <div class="buttons">
            <button id="btnCalcularCredito" class="btn-primary">Calcular Crédito</button>
            <button id="btnReiniciar" class="btn-secondary">Reiniciar</button>
        </div>
    </div>

    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</body>
</html>
